<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/98523245df.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advice Ticket</title>
</head>
<body>
    <div id="ticket">
        <div id="ticket-left">
            <h1>Advice Ticket</h1>
            <hr>
            <div id="github">
                <a href=""><i class="fa-brands fa-github"></i></a>
                <p>Click Me!</p>
            </div>
            <div id="advice-div">
                <p id="advice">
                    Everything matters, but nothing matters that much.
                </p>
            </div>
            <hr>
            <div id="advice-number">
                Advice Number: 106
            </div>
            <div id="advice-credit">
                From https://api.adviceslip.com/ <br>
                created by pratyush with ♡
            </div>
            <div id="date-time-div">
                <div id="time">
                    19:24:00
                </div>
                <div id="date">
                    24-09-2023
                </div>
            </div>
        </div>
        <div id="ticket-right">
            <i class="fa-solid fa-scissors" id="scissors"></i>
            <div id="qr-text-div">
                <p id="qr-text">
                    Advice Number: 106
                </p>
            </div>
            <div id="qr-div">
                <img src="" alt="" id="qr">
            </div>
            <div id="qr-credit">
                Generated by https://goqr.me/api/
            </div>
        </div>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
